name: RightClickBuddy
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.karry
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Versioning rule:
    #  - MARKETING_VERSION is semantic and bumped by hand (minor = features, patch = fixes).
    #  - CURRENT_PROJECT_VERSION (build number) is auto-derived from the git commit count;
    #    the build scripts override it at build time, so this value is only a fallback.
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Left blank on purpose: the recommended build path is ad-hoc signing (see README),
    # which needs no team. Set your own team here only if you build/sign in Xcode.
    DEVELOPMENT_TEAM: ""

schemes:
  RightClickBuddy:
    build:
      targets:
        RightClickBuddy: all

packages: {}

targets:
  RightClickBuddy:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    resources:
      - path: Shared/Localization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.karry.RightClickBuddy
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: RightClickBuddy
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: App/RightClickBuddy.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: RightClickBuddyFinderSync

  RightClickBuddyFinderSync:
    type: app-extension
    platform: macOS
    productName: RightClickBuddyFinderSync
    sources:
      - path: FinderSync
      - path: Shared
    resources:
      - path: Shared/Localization
    info:
      path: FinderSync/Info.plist
      properties:
        CFBundleDisplayName: RightClickBuddyFinderSync
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes: {}
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.karry.RightClickBuddy.FinderSync
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FinderSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderSync/RightClickBuddyFinderSync.entitlements
        # Finder Sync extensions require sandbox
        ENABLE_APP_SANDBOX: YES
        # Enable Finder Sync capability
        COMBINE_HIDPI_IMAGES: YES
