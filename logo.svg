<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="cursorShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle decoration -->
  <g opacity="0.05">
    <circle cx="420" cy="420" r="180" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="420" cy="420" r="260" fill="none" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ===== SIMPLIFIED MENU PANEL ===== -->
  <!-- Pure geometric shapes — no text, recognizable at all sizes -->
  <g filter="url(#panelShadow)">
    <!-- Menu body -->
    <rect x="60" y="70" width="200" height="300" rx="24" fill="#FFFFFF" opacity="0.93"/>

    <!-- macOS window dots -->
    <circle cx="88" cy="100" r="6" fill="#EF4444"/>
    <circle cx="108" cy="100" r="6" fill="#F59E0B"/>
    <circle cx="128" cy="100" r="6" fill="#10B981"/>

    <!-- Menu item bars — chunky for small-size readability -->
    <!-- Selected item (brand color) -->
    <rect x="84" y="140" width="152" height="22" rx="8" fill="#4F46E5"/>
    <!-- Item 2 -->
    <rect x="84" y="182" width="124" height="16" rx="6" fill="#CBD5E1"/>
    <!-- Item 3 -->
    <rect x="84" y="218" width="100" height="16" rx="6" fill="#CBD5E1"/>
    <!-- Separator -->
    <rect x="84" y="254" width="152" height="2" rx="1" fill="#E2E8F0"/>
    <!-- Item 4 -->
    <rect x="84" y="276" width="136" height="16" rx="6" fill="#CBD5E1"/>
    <!-- Item 5 -->
    <rect x="84" y="312" width="108" height="16" rx="6" fill="#CBD5E1"/>
  </g>

  <!-- ===== LARGE, BOLD CURSOR (scaled 1.2x) ===== -->
  <!-- Dominant shape — stays recognizable at 16px -->
  <g filter="url(#cursorShadow)" transform="matrix(1.2, 0, 0, 1.2, -40, -31)">
    <!-- Cursor body -->
    <path d="M 202,155
             L 202,395
             L 260,337
             L 290,410
             L 308,394
             L 277,322
             L 318,310 Z"
          fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner highlight for depth -->
    <path d="M 210,170 L 210,230 L 232,210 Z" fill="#F8FAFC"/>
    <!-- Right-click indicator dot -->
    <circle cx="287" cy="383" r="9" fill="#4F46E5"/>
  </g>
</svg>
